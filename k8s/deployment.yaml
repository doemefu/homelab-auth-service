apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: apps
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          # Image tag is managed by Flux CD image automation.
          image: ghcr.io/doemefu/homelab-auth-service:main-20260413T192135 # {"$imagepolicy": "flux-system:auth-service"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homelab-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-db-credentials
                  key: password
            - name: DB_URL
              value: "jdbc:postgresql://postgres.apps.svc.cluster.local:5432/homelabdb"
            - name: APP_JWT_PRIVATE_KEY
              value: "file:/etc/secrets/private.pem"
            - name: APP_JWT_PUBLIC_KEY
              value: "file:/etc/secrets/public.pem"
            - name: GRAFANA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homelab-auth-secrets
                  key: grafana-client-secret
            - name: HA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homelab-auth-secrets
                  key: ha-client-secret
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-dsn
                  key: dsn
                  optional: true
          volumeMounts:
            - name: rsa-keys
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: rsa-keys
          secret:
            secretName: homelab-auth-rsa-keys
