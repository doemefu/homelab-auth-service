spring:
  application:
    name: auth-service

  test:
    database:
      replace: any

  datasource:
    url: jdbc:tc:postgresql:17:///testdb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    table: flyway_schema_history_auth

server:
  port: 8080

app:
  jwt:
    private-key: classpath:keys/test_rsa_private.pem
    public-key: classpath:keys/test_rsa_public.pem
    access-token-expiry: 900000
    refresh-token-expiry: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
