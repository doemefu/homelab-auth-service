spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/homelabdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    table: flyway_schema_history_auth

server:
  port: 8080

app:
  jwt:
    private-key: classpath:keys/private.pem
    public-key: classpath:keys/public.pem
    access-token-expiry: 900000
    refresh-token-expiry: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html