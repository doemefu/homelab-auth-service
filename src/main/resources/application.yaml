spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homelabdb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    table: flyway_schema_history_auth
    baseline-on-migrate: true
    baseline-version: 4

server:
  port: 8080
  forward-headers-strategy: native

app:
  jwt:
    private-key: classpath:keys/private.pem
    public-key: classpath:keys/public.pem
    access-token-expiry: 900000
    refresh-token-expiry: 604800000
  oidc:
    issuer: https://auth.furchert.ch
    clients:
      - client-id: grafana
        # The env var must include the Spring Security {id} prefix, e.g. "{noop}secret" or "{bcrypt}$2a$...".
        client-secret: "${GRAFANA_CLIENT_SECRET}"
        redirect-uris:
          - https://grafana.furchert.ch/login/generic_oauth
        post-logout-redirect-uris:
          - https://grafana.furchert.ch
        scopes: [openid, profile, email]
      - client-id: homeassistant
        # The env var must include the Spring Security {id} prefix, e.g. "{noop}secret" or "{bcrypt}$2a$...".
        client-secret: "${HA_CLIENT_SECRET}"
        redirect-uris:
          - https://ha.furchert.ch/auth/oidc/callback
        post-logout-redirect-uris:
          - https://ha.furchert.ch
        scopes: [openid, profile, email]

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

sentry:
  dsn: ${SENTRY_DSN:}
  environment: production
  send-default-pii: false
  traces-sample-rate: 0.0
  logging:
    enabled: true
    minimum-event-level: ERROR
    minimum-breadcrumb-level: WARN
  tags:
    service: auth-service
